name: UI_Tests

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: 0 1 * * SUN

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Checkout (copy) gh-pages repository to GitHub runner
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ./.github/gh-pages

      - name: Load history
        run: |
          if [ -d ".github/gh-pages/history" ]; then
            sudo mkdir -p allure-results/history
            sudo cp -r .github/gh-pages/history/* allure-results/history/
          fi

      - name: Run UI-Tests via docker-compose
        continue-on-error: true
        run: docker compose up --abort-on-container-exit

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre
          wget https://github.com/allure-framework/allure2/releases/download/2.39.0/allure-2.39.0.zip
          unzip allure-2.39.0.zip
          sudo ln -s $(pwd)/allure-2.39.0/bin/allure /usr/bin/allure

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.CI_TOKEN }}
          branch: gh-pages
          folder: allure-report
          clean: true          